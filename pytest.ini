[pytest]
# addopts : options par défaut. 
# -v : verbeux, --cov : mesure le coverage de app/, --cov-report : génère le rapport HTML
addopts = -v --cov=app --cov-report=html --cov-report=term-missing
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers pour filtrer les tests (ex: pytest -m unit)
markers =
    unit: tests unitaires isolés
    slow: tests lents (> 1s)
    pricing: tests du module pricing
    integration: tests d'intégration API